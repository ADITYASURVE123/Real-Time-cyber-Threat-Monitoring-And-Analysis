version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cyber_incidents
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cyber-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: flask_backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/cyber_incidents
      FLASK_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cyber-net

volumes:
  postgres_data:

networks:
  cyber-net:
    driver: bridge